# ============================================
# 字段映射配置
# 业务侧 Excel 加列/改字段名时,只需改这里,无需改代码
# ============================================
# 你的 Excel 列顺序(25 列):
#   序号 / 人员 / 软件预算规模 / 云资源量级（w）/ 整体规模 / 机会点名称
#   部署方式 / 赛道 / 客户 / 预测下单月份 / 把握度 / 项目阶段
#   项目进展（每周刷新）/ 是否属于133个生态作战地图方案 / PO/HO / PCE录入
#   未录入原因 / 机会点ID / 机会点状态 / 行业 / 场景 / 伙伴
#   伙伴名称221（全）/ 标准方案名称 / 风险及求助
# ============================================

fields:
  # === 基础信息 ===
  project_no:
    excel: "序号"
    type: string
    required: false  # 不强制,系统自动生成也行
    label: "项目编号"

  owner:
    excel: "人员"
    type: string
    label: "负责人"

  # === 金额(万元) ===
  software_budget:
    excel: "软件预算规模"
    type: number
    unit: "万"
    label: "软件预算"

  cloud_budget:
    excel: "云资源量级（w）"
    type: number
    unit: "万"
    label: "云资源预算"

  # === 整体规模(Excel 直接提供,不再用公式推导) ===
  scale_amount:
    excel: "整体规模"
    type: number
    unit: "万"
    label: "项目总规模"
    required: false  # 缺这个字段时,系统会用 software + cloud 兜底

  # === 项目信息 ===
  opportunity_name:
    excel: "机会点名称"
    type: string
    required: true
    label: "机会点名称"

  deployment_mode:
    excel: "部署方式"
    type: string
    label: "部署方式"

  track:
    excel: "赛道"
    type: string
    label: "赛道"

  customer:
    excel: "客户"
    type: string
    label: "客户名称"

  # === 时间 ===
  predict_month:
    excel: "预测下单月份"
    type: string
    label: "预测下单月份"
    # 格式:YYYY-MM,例如 2026-07

  # === 状态 ===
  confidence:
    excel: "把握度"
    type: string
    label: "把握度"

  stage:
    excel: "项目阶段"
    type: string
    label: "项目阶段"
    # 典型值:SS1~SS8

  progress_note:
    excel: "项目进展（每周刷新）"
    type: string
    label: "项目进展"

  # === 分类标记 ===
  in_eco_map:
    excel: "是否属于133个生态作战地图方案"
    type: string
    label: "生态地图"
    # 是/否

  po_ho:
    excel: "PO/HO"
    type: string
    label: "PO/HO"
    # PO / HO

  pce_entered:
    excel: "PCE录入"
    type: string
    label: "PCE录入"

  pce_reason:
    excel: "未录入原因"
    type: string
    label: "未录入原因"

  # === 系统字段 ===
  opp_id:
    excel: "机会点ID"
    type: string
    label: "机会点ID"

  opp_status:
    excel: "机会点状态"
    type: string
    label: "机会点状态"

  # === 业务分类 ===
  industry:
    excel: "行业"
    type: string
    label: "行业"

  scenario:
    excel: "场景"
    type: string
    label: "场景"

  # === 伙伴 ===
  # 注意:Excel 里有"伙伴"和"伙伴名称221（全）"两列
  # "伙伴名称221（全）"是真正的伙伴名称(括号里 221 是总伙伴数)
  # "伙伴"是伙伴分类/类型(可选)
  partner:
    excel: "伙伴名称221（全）"
    type: string
    required: true
    label: "伙伴名称"

  partner_category:
    excel: "伙伴"
    type: string
    required: false
    label: "伙伴类型"

  standard_solution:
    excel: "标准方案名称"
    type: string
    label: "标准方案名称"

  risk_note:
    excel: "风险及求助"
    type: string
    label: "风险及求助"


# ============================================
# 派生字段(不由 Excel 直接提供,系统计算)
# ============================================
derived:
  # scale_amount 现在从 Excel 直接读取,不再是派生
  # 仅在 Excel 缺这一列时用此公式兜底
  scale_amount_fallback:
    formula: "software_budget + cloud_budget"
    label: "项目总规模(兜底公式)"
    unit: "万"

  is_signed:
    formula: "confidence == '已下单'"
    label: "是否已签单"

  is_at_risk:
    formula: "confidence == '风险'"
    label: "是否风险项目"


# ============================================
# 维度字典(报表分析的分组维度)
# ============================================
dimensions:
  confidence:
    label: "把握度"
    field: confidence
    order:
      - 已下单
      - 保底
      - 机会
      - 风险
      - 关闭

  time:
    label: "时间(预测下单月份)"
    field: predict_month
    granularity: month

  partner:
    label: "伙伴"
    field: partner

  po_ho:
    label: "PO/HO"
    field: po_ho
    order: [PO, HO]

  industry:
    label: "行业"
    field: industry

  track:
    label: "赛道"
    field: track

  deployment_mode:
    label: "部署方式"
    field: deployment_mode

  stage:
    label: "项目阶段"
    field: stage